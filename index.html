<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechSubbies.com</title>
      <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
      
      
      
      <link rel="icon" type="image/png" href="/brand/techsubbies-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    
      
      
      <script type="module" src="./index.tsx"></script>

<!-- TECHSUBBIES NAV ORDER FIX -->
<script>
(function () {
  function cleanText(value) {
    return String(value || "").replace(/\s+/g, " ").trim();
  }

  function menuLabel(item) {
    if (!item) return "";

    const directControls = item.querySelectorAll("button, a, [role='button']");

    for (const control of directControls) {
      const text = cleanText(control.textContent);

      if (
        text === "About" ||
        text === "Engineers" ||
        text === "Companies" ||
        text === "Resourcing Companies"
      ) {
        return text;
      }
    }

    return cleanText(item.textContent);
  }

  function fixTechSubbiesNavOrder() {
    const headers = Array.from(document.querySelectorAll("header"));

    for (const header of headers) {
      const navs = Array.from(header.querySelectorAll("nav"));

      for (const nav of navs) {
        const items = Array.from(nav.children);

        const about = items.find((item) => menuLabel(item) === "About");
        const engineers = items.find((item) => menuLabel(item) === "Engineers");
        const companies = items.find((item) => menuLabel(item) === "Companies");
        const resourcing = items.find((item) => menuLabel(item) === "Resourcing Companies");

        if (!about || !engineers || !companies || !resourcing) {
          continue;
        }

        nav.appendChild(engineers);
        nav.appendChild(companies);
        nav.appendChild(resourcing);
        nav.appendChild(about);
      }
    }
  }

  let scheduled = false;

  function scheduleFix() {
    if (scheduled) return;

    scheduled = true;

    window.requestAnimationFrame(function () {
      scheduled = false;
      fixTechSubbiesNavOrder();
    });
  }

  document.addEventListener("DOMContentLoaded", scheduleFix);
  window.addEventListener("load", scheduleFix);
  window.addEventListener("hashchange", scheduleFix);
  window.addEventListener("popstate", scheduleFix);

  new MutationObserver(scheduleFix).observe(document.documentElement, {
    childList: true,
    subtree: true
  });

  scheduleFix();
})();
</script>
<!-- /TECHSUBBIES NAV ORDER FIX -->
</body>
</html>
